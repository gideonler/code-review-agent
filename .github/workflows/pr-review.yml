name: Sentinel PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Sentinel bot
        uses: actions/checkout@v4
        with:
          repository: gideonler/sentinel-bot
          path: sentinel-bot

      - name: Checkout Sentinel agent
        uses: actions/checkout@v4
        with:
          repository: gideonler/code-review-agent
          path: code-review-agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent + dependencies
        run: pip install -e ./code-review-agent groq

      - name: Fetch base branch for diff
        run: git fetch origin ${{ github.base_ref }}

      - name: Run Sentinel review
        env:
          SENTINEL_PROVIDER: ${{ vars.SENTINEL_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BASE_REF: origin/${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python sentinel-bot/review.py
